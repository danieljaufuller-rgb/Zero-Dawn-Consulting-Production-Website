    <!-- Structured data: business entity -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ProfessionalService",
      "name": "Zero Dawn Consulting",
      "alternateName": "Zero Dawn Design Studio",
      "url": "https://zerodawnconsulting.com/",
      "logo": "https://zerodawnconsulting.com/assets/logo-transparent.png",
      "image": "https://zerodawnconsulting.com/assets/og-image.jpg",
      "description": "Web design, UX/UI and AI workflow automation for Australian small and medium businesses.",
      "email": "daniel@zerodawnconsulting.com",
      "telephone": "+61422196311",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "Suite 2, Level 3, 13-15 Wentworth Avenue",
        "addressLocality": "Sydney",
        "addressRegion": "NSW",
        "postalCode": "2000",
        "addressCountry": "AU"
      },
      "areaServed": { "@type": "Country", "name": "Australia" },
      "sameAs": ["https://www.instagram.com/zero_dawn_consulting/"],
      "knowsAbout": ["Web design", "UX/UI design", "AI workflow automation"]
    }
    </script>

    <!-- Structured data: website -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Zero Dawn Design Studio",
      "url": "https://zerodawnconsulting.com/"
    }
    </script>

    <!-- Structured data: FAQ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What does Zero Dawn Consulting do?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Zero Dawn Consulting is a Sydney-based studio that designs and builds websites and AI-powered workflow automation for Australian small and medium businesses, including trades, allied health, real estate and professional services."
          }
        },
        {
          "@type": "Question",
          "name": "How much does a website cost?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Every project is quoted individually after a short discovery conversation, because scope varies. You always receive a clear, fixed quote before any work begins, with no obligation."
          }
        },
        {
          "@type": "Question",
          "name": "How long does it take to build a website?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Most websites go live within two to four weeks of kicking off, depending on how quickly content and feedback come together."
          }
        },
        {
          "@type": "Question",
          "name": "Where is Zero Dawn Consulting based, and do you work with clients remotely?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Zero Dawn Consulting is based in Sydney, Australia, and works with clients across the country. Most projects run entirely remotely."
          }
        },
        {
          "@type": "Question",
          "name": "What is AI workflow automation?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "AI workflow automation uses AI tools to take repetitive admin off your plate — responding to enquiries, preparing quotes, chasing follow-ups and moving information between the systems you already use."
          }
        },
        {
          "@type": "Question",
          "name": "Do you offer support after the website launches?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Revisions, content updates and ongoing improvements can all be arranged after launch, and every website is handed over properly so the client owns everything."
          }
        }
      ]
    }
    </script>
  </head>

    <div id="root"></div>
